<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;300;400;600;700;900&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
        }
    </style>
</head>

<body>
    <button onclick="document.getElementById('profile').style.display='flex'" class="h-11 px-5 flex justify-center items-centertext-black font-bold text-sm whitespace-nowrap hover:shadow-[0_0_15px_#FFBB02] transition-all">
        <img class="h-12 w-12 rounded-full object-cover" src="/img/profile.png" alt="Profile">
    </button>
    <form class="flex">
        <!-- Popup Overlay -->
        <div id="profile" style="display:none;" class="fixed inset-0 bg-black/60 flex justify-center items-center z-50">

            <!-- Popup Box (your form wrapper) -->
            <div class="relative">

                <!-- ✕ Close Button -->
                <button onclick="document.getElementById('profile').style.display='none'"
                    class="absolute top-4 right-4 text-white text-2xl font-bold hover:text-[#FFBB02] z-0">
                    &times;
                </button>

                <div class="flex flex-col border rounded-[20px] sm:rounded-[25px]
                shadow-[0_0_20px_#FFCA41] border-amber-200
                z-10 m-4 sm:m-6 lg:m-10
                w-[95vw] sm:w-[90vw] lg:w-[973px]
                bg-[#0C0D2A]/[48%]
                pb-4">

                    <!-- Header -->
                    <div class="pt-4 sm:pt-5 pl-4 sm:pl-5">
                        <span class="text-white text-3xl sm:text-4xl lg:text-5xl font-extrabold">
                            PROFILE SETTINGS
                        </span><br>
                        <span class="text-[#B5B5B5] text-sm sm:text-base lg:text-lg font-medium">
                            Manage your identity and security protocols.
                        </span>
                    </div>

                    <!-- Inner Panel -->
                    <div class="flex flex-col items-center justify-center pt-2 px-2 sm:px-3">
                        <div class="flex flex-col bg-[#394760]/[60%]
                        rounded-[20px] sm:rounded-[27px]
                        w-full
                        py-2">

                            <!-- Basic Information Header -->
                            <div class="flex flex-row gap-2 px-4 sm:px-5 py-4 sm:py-5 items-center">
                                <img class="w-[28px] h-[28px] sm:w-[34px] sm:h-[34px]" src="/img/profile.png" alt="">
                                <span class="text-white text-sm sm:text-base font-bold">
                                    BASIC INFORMATION
                                </span>
                            </div>

                            <!-- ProfileSettings -->
                            <div class="px-4 sm:px-5">
                                <div class="flex flex-col sm:flex-row gap-4 sm:justify-evenly">
                                    <div class="flex flex-col w-full sm:w-[48%]">
                                        <span class="text-white py-1 text-sm font-semibold">Full Name</span>
                                        <input class="border h-10 border-white rounded-lg text-white 
                                    font-medium px-3 bg-transparent text-sm" type="text" placeholder="John C. Doe">
                                    </div>
                                    <div class="flex flex-col w-full sm:w-[48%]">
                                        <span class="text-white py-1 text-sm font-semibold">Contact Number</span>
                                        <input class="border h-10 border-white rounded-lg text-white
                                    font-medium px-3 bg-transparent text-sm" type="text"
                                            placeholder="+63 912 123 4567">
                                    </div>
                                </div>

                                <br>

                                <div class="flex flex-col items-center border-b-2 border-[#AFAFAF] py-4 sm:py-5">
                                    <button class="cursor-pointer w-full h-[42px] sm:h-[46px] text-white 
                                rounded-lg bg-[#364057] text-sm sm:text-base font-bold
                                hover:bg-[#FFBB02] hover:text-black transition-colors">
                                        Update Basic Profile
                                    </button>
                                </div>
                            </div>

                            <!-- Sec and Pass -->
                            <div class="flex flex-col">
                                <div class="flex flex-row gap-2 px-4 sm:px-5 py-4 sm:py-5 items-center">
                                    <img class="w-[28px] h-[28px] sm:w-[34px] sm:h-[34px]" src="/img/lock.png" alt="">
                                    <span class="text-white text-sm sm:text-base font-bold">
                                        SECURITY AND PASSWORD
                                    </span>
                                </div>
                            </div>

                            <!-- Password -->
                            <div class="px-4 sm:px-5">
                                <div class="flex flex-col sm:flex-row gap-4 sm:justify-evenly">
                                    <div class="flex flex-col w-full sm:w-[48%]">
                                        <span class="text-white py-1 font-semibold text-sm">New Password</span>
                                        <input class="border h-10 border-white rounded-lg
                                    text-white font-medium px-3 bg-transparent text-sm" type="password"
                                            placeholder="********">
                                    </div>
                                    <div class="flex flex-col w-full sm:w-[48%]">
                                        <span class="text-white py-1 text-sm font-semibold">Confirm Password</span>
                                        <input class="border h-10 border-white rounded-lg
                                    text-white font-medium px-3 bg-transparent text-sm" type="password"
                                            placeholder="********">
                                    </div>
                                </div>

                                <br>

                                <div class="flex flex-col items-center py-4 sm:py-5">
                                    <button class="cursor-pointer w-full h-[42px] sm:h-[46px] rounded-lg
                                bg-[#FFBB02] text-sm sm:text-base font-bold
                                hover:bg-[#364057] hover:text-white transition-colors">
                                        Change Password
                                    </button>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>


            </div>
        </div>

    </form>
</body>

</html>
