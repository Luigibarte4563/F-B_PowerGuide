<!DOCTYPE html>
<html lang="en" class="scroll:smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerGuide Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="./output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;300;400;600;700;900&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
        }
    </style>
</head>

<body class="bg-[#03041A] text-white font-['Montserrat']">

    <header id="mainHeader" class="flex flex-row sticky top-0 z-50
                h-16 md:h-[100px] text-2xl items-center
                justify-between px-4 md:px-0
                bg-black/50 backdrop-blur-2xl
                border-b border-white/10 -ml-8">
        <div class="flex pl-8 items-center gap-2">
            <a href="/src/landing.html" class="flex pl-10 items-center gap-2">
                <img class="w-10 md:w-16" src="../img/logo.png" alt="">
                <div class="flex flex-col justify-center items-start">
                    <span class="text-white font-bold text-lg md:text-xl leading-tight">
                        POWER<span class="text-[#FFBB02]">GUIDE</span>
                    </span>
                    <span class="text-white font-medium text-sm md:text-xs tracking-widest opacity-70 leading-none">
                        SECURITY AND RELIABILITY
                    </span>
                </div>
            </a>
        </div>
        <div class="flex items-center gap-6 md:gap-10 p-2 md:p-4 text-xs md:text-sm font-bold">
            <a href="landing.html" onclick="fadeOut(event)">
                <button class="int-btn cursor-pointer px-3 py-1.5 md:px-4 md:py-2
                    bg-[#FFBB02] text-black rounded-full
                    hover:bg-[#D99A00] active:bg-[#FFC833]
                    transform transition-all duration-200 ease-in-out
                    hover:scale-105 active:scale-95 mr-6">
                    Back to Home
                </button>
            </a>
            <!-- Hamburger button (mobile only) -->
            <button id="menuBtn" class="md:hidden text-white p-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto pt-6 pb-10 px-6">
        <h1 class="text-4xl font-black mb-6">Outage Reporting Map</h1>
        
        <div class="flex flex-col lg:flex-row gap-10">
            
            <div class="w-full lg:w-2/3 h-[500px] border-4 border-[#FFBB02] rounded-3xl overflow-hidden">
                <iframe 
                    width="100%" height="100%" frameborder="0" style="border:0"
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d30560.844374303495!2d120.32049970986708!3d16.04610738440537!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3391667b36f755a5%3A0x6b472e3919e13d94!2sDagupan%2C%20Pangasinan!5e0!3m2!1sen!2sph!4v1715000000000" 
                    allowfullscreen>
                </iframe>
            </div>

            <div class="w-full lg:w-1/3 bg-[#0C0D2A] p-8 rounded-3xl shadow-[0_0_20px_#FFBB02]">
                <h2 class="text-2xl font-bold mb-6 text-[#FFBB02]">Submit Outage</h2>

                <form action="#" method="POST" class="flex flex-col gap-4">

                    <label class="text-sm font-medium">Street / Area Name</label>
                    <input type="text" required
                        class="w-full h-11 px-4 rounded-xl
                        bg-white/10 border border-white/10
                        text-sm font-medium text-white 
                        placeholder:text-white/40
                        outline-none focus:border-[#FFBB02]/50 focus:ring-1 focus:ring-[#FFBB02]/30" placeholder="Bonuan Binloc">

                    <label class="text-sm font-medium">Outage Type</label>
                    <div class="custom-select relative w-full" id="outageSelect">

                        <!-- Button -->
                        <button type="button"
                            onclick="toggleDropdown('outageSelect', event)"
                            class="w-full px-3 h-12 bg-[#1A1B33] text-white text-left text-sm
                            border-2 border-[#B5B5B5]/[50%] rounded-2xl cursor-pointer
                            flex items-center justify-between focus:outline-none">

                            <span class="select-label text-white/50">Select Outage Type</span>

                            <svg class="select-arrow w-4 h-4 transition-transform duration-200"
                                fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
                            </svg>
                        </button>

                        <!-- Options -->
                        <div class="select-options absolute z-50 w-full mt-2 bg-[#364057]
                            border-2 border-[#B5B5B5]/[50%] rounded-2xl overflow-hidden
                            opacity-0 scale-95 pointer-events-none
                            transition-all duration-200 ease-out origin-top">

                            <div class="select-option px-4 py-3 text-sm text-white cursor-pointer
                                hover:bg-[#FFBB02] hover:text-black transition-colors duration-150">
                                Scheduled Maintenance
                            </div>

                            <div class="select-option px-4 py-3 text-sm text-white cursor-pointer
                                hover:bg-[#FFBB02] hover:text-black transition-colors duration-150">
                                Unexpected Brownout
                            </div>

                            <div class="select-option px-4 py-3 text-sm text-white cursor-pointer
                                hover:bg-[#FFBB02] hover:text-black transition-colors duration-150">
                                Voltage Fluctuation
                            </div>

                        </div>

                        <input type="hidden" name="outage_type">

                    </div>

                    <label class="text-sm font-medium">Description</label>
                    <textarea rows="2"
                        class="w-full px-4 py-3 rounded-xl
                        bg-white/10 border border-white/10
                        text-sm font-medium text-white
                        placeholder:text-white/40
                        outline-none focus:border-[#FFBB02]/50 focus:ring-1 focus:ring-[#FFBB02]/30" placeholder="Describe what happened..."></textarea>

                    <button type="submit"
                        class="int-btn mt-4 bg-[#FFBB02] text-black font-bold py-3 rounded-lg
                        hover:bg-[#D99A00] active:bg-[#FFC833]
                        transition-all duration-200">
                        Send Report
                    </button>

                </form>
            </div>
        </div>
    </main>

    <footer class="py-10 text-center border-t border-white/10 bg-[#0B0C22]">
        <span class="text-white/50 text-xs tracking-widest uppercase">
            V6 @ 2026 POWERGUIDE. BUILT FOR THE COMMUNITY.
        </span>
    </footer>
    
    <script src="./script.js"></script>
    <script>
        window.addEventListener("load", () => {
            document.body.classList.add("loaded");
        });
    </script>
</body>
</html>
