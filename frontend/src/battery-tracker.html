<!DOCTYPE html>
<html lang="en" class="scroll:smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerGuide Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="./output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;300;400;600;700;900&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
        }
    </style>
</head>

<body class="bg-[#03041A] text-white font-['Montserrat']">

    <header id="mainHeader" class="flex flex-row sticky top-0 z-50
                h-16 md:h-[100px] text-2xl items-center
                justify-between px-4 md:px-0
                bg-black/50 backdrop-blur-2xl
                border-b border-white/10 -ml-8">
        <div class="flex pl-8 items-center gap-2">
            <a href="/src/landing.html" class="flex pl-10 items-center gap-2">
                <img class="w-10 md:w-16" src="../img/logo.png" alt="">
                <div class="flex flex-col justify-center items-start">
                    <span class="text-white font-bold text-lg md:text-xl leading-tight">
                        POWER<span class="text-[#FFBB02]">GUIDE</span>
                    </span>
                    <span class="text-white font-medium text-sm md:text-xs tracking-widest opacity-70 leading-none">
                        SECURITY AND RELIABILITY
                    </span>
                </div>
            </a>
        </div>
        <div class="flex items-center gap-6 md:gap-10 p-2 md:p-4 text-xs md:text-sm font-bold">
            <a href="landing.html" onclick="fadeOut(event)">
                <button class="int-btn cursor-pointer px-3 py-1.5 md:px-4 md:py-2
                    bg-[#FFBB02] text-black rounded-full
                    hover:bg-[#D99A00] active:bg-[#FFC833]
                    transform transition-all duration-200 ease-in-out
                    hover:scale-105 active:scale-95 mr-6">
                    Back to Home
                </button>
            </a>
            <!-- Hamburger button (mobile only) -->
            <button id="menuBtn" class="md:hidden text-white p-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-12">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-stretch">

            <!-- Left Side: Main Visual -->
            <section
                class="bg-[#31324C]/40 backdrop-blur-xl border border-white/10 rounded-[2rem] p-10 flex flex-col items-center shadow-2xl">
                <span
                    class="bg-white/10 px-4 py-1 rounded-full text-[10px] font-bold tracking-[0.2em] uppercase text-gray-300 mb-8">
                    Active Session
                </span>

                <!-- Battery Ring -->
                <div class="relative flex items-center justify-center mb-10">
                    <svg class="w-64 h-64 -rotate-90" viewBox="0 0 120 120">
                        <circle cx="60" cy="60" r="54" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="8" />
                        <circle id="battery-ring" cx="60" cy="60" r="54" fill="none" stroke="#FFBB02" stroke-width="8"
                            stroke-linecap="round" stroke-dasharray="339.29" stroke-dashoffset="339.29" />
                    </svg>
                    <div class="absolute flex flex-col items-center">
                        <div id="level" class="text-white text-6xl font-bold tracking-tight">--%</div>
                        <span id="state-label"
                            class="text-gray-400 text-xs font-semibold tracking-widest mt-2 uppercase">Standby</span>
                    </div>
                </div>

                <!-- Primary Status Box -->
                <div class="w-full bg-black/20 rounded-2xl p-5 border border-white/5 flex justify-between items-center">
                    <div>
                        <p class="text-[10px] text-gray-500 font-bold tracking-wider uppercase">Power Source</p>
                        <p id="status" class="text-lg font-semibold text-yellow-500">Detecting...</p>
                    </div>
                    <div id="charge-icon" class="text-gray-600">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                    </div>
                </div>
            </section>

            <!-- Right Side: Secondary Stats -->
            <section class="flex flex-col h-full">
                <div
                    class="bg-[#31324C]/40 backdrop-blur-xl border border-white/10 rounded-[2rem] p-8 flex-1 flex flex-col justify-center">
                    <h3 class="text-sm font-bold tracking-widest uppercase text-gray-400 mb-6">Detailed Estimates</h3>

                    <div class="space-y-6">
                        <div class="flex justify-between items-end border-b border-white/5 pb-4">
                            <div>
                                <p class="text-xs text-gray-500 mb-1">Remaining Time</p>
                                <p id="time-remaining" class="text-xl font-semibold">Calculating...</p>
                            </div>
                            <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                        </div>

                        <div class="flex justify-between items-end border-b border-white/5 pb-4">
                            <div>
                                <p class="text-xs text-gray-500 mb-1">Cycles Completed</p>
                                <p class="text-xl font-semibold">142</p>
                            </div>
                            <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                            </svg>
                        </div>
                    </div>

                    <!-- Low Battery Alert -->
                    <div id="warning-box"
                        class="hidden mt-8 p-4 bg-red-500/10 border border-red-500/20 rounded-xl flex gap-3 items-center">
                        <div class="text-red-500">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                            </svg>
                        </div>
                        <div>
                            <p class="text-sm font-bold text-red-400 uppercase">Critical Level</p>
                            <p class="text-xs text-red-200/60">Connect power source immediately.</p>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer class="py-10 text-center border-t border-white/10 bg-[#0B0C22]">
        <span class="text-white/50 text-xs tracking-widest uppercase">
            V6 @ 2026 POWERGUIDE. BUILT FOR THE COMMUNITY.
        </span>
    </footer>

    <script src="./script.js"></script>
    <script>
        window.addEventListener("load", () => {
            document.body.classList.add("loaded");
        });
    </script>
</body>

</html>
